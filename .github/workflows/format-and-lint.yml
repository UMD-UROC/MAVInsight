name: Format, Lint & Test
on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  format-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort pytest
      - name: Run autoformatters (ruff, black, isort)
        run: |
          # ruff supports formatting (ruff format) and autofix (ruff check --fix)
          ruff format . || true
          ruff check --fix . || true
          black . --target-version py310
          isort .
      - name: Run linters & tests
        run: |
          ruff check .
          black --check . --target-version py310
          isort --check-only .
          pytest -q
      - name: Commit & push formatting changes
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions[bot]
          author_email: github-actions[bot]@users.noreply.github.com
          message: "chore: apply autoformatters"
          add: "."
          push: true
