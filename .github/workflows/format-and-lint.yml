name: Format, Lint & Test
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  format-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install tools\n        run: |\n          python -m pip install --upgrade pip\n          pip install ruff black isort pytest\n      - name: Run Ruff action\n        uses: astral-sh/ruff-action@v3.6.1\n        continue-on-error: true\n      - name: Run checks (ruff, black, isort, pytest)
        id: checks
        run: |
          set +e
          ruff check .; r1=$?
          black --check . --target-version py310; r2=$?
          isort --check-only .; r3=$?
          pytest -q; r4=$?
          rc=$((r1|r2|r3|r4))
          echo "rc=$rc" >> $GITHUB_OUTPUT
        continue-on-error: true
      - name: Format & commit fixes (only if checks failed)
        if: steps.checks.outputs.rc != '0'
        uses: actions/github-script@v7
        with:
          script: |
            core = require('@actions/core')
            const exec = require('@actions/exec')
            async function run() {
              await exec.exec('ruff', ['format', '.']).catch(()=>{});
              await exec.exec('ruff', ['check','--fix','.']).catch(()=>{});
              await exec.exec('black', ['.', '--target-version', 'py310']).catch(()=>{});
              await exec.exec('isort', ['.']).catch(()=>{});
            }
            run()
      - name: Commit & push formatting changes
        if: steps.checks.outputs.rc != '0' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions[bot]
          author_email: github-actions[bot]@users.noreply.github.com
          message: "chore: apply autoformatters"
          add: "."
          push: true
      - name: Re-run checks after formatting (fail if still issues)
        if: steps.checks.outputs.rc != '0'
        run: |
          ruff check .
          black --check . --target-version py310
          isort --check-only .
          pytest -q

