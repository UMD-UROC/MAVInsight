name: Autoformat, Lint & Test
on: [push, pull_request]

permissions:
  contents: write

jobs:
  format-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install tools
        run: python -m pip install --upgrade pip && pip install ruff black isort pytest
      - name: Run autoformatters
        run: |
          ruff format . || ruff check --fix .
          black .
          isort .
      - name: Run linters & tests
        run: |
          ruff check .
          black --check .
          isort --check-only .
          pytest -q
      - name: Commit & push formatting changes
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions[bot]
          author_email: github-actions[bot]@users.noreply.github.com
          message: "chore: apply autoformatters"
          add: "."
          push: true
